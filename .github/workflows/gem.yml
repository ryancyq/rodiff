name: Gem Installation
concurrency:
  group: "${{ github.workflow }}-${{ github.ref }}"
  cancel-in-progress: true
on:
  workflow_dispatch:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  package:
    name: "Package for ${{ matrix.platform }}"
    strategy:
      fail-fast: false
      matrix:
        platform:
          - arm64-darwin
          - ruby
          - x64-mingw-ucrt
          - x64-mingw32
          - x86_64-darwin
          - x86_64-linux
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

        # https://bundler.io/blog/2018/01/17/making-gem-development-a-little-better.html
      - run: rm Gemfile.lock

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: "4"
          bundler: latest
          bundler-cache: true

      - run: "bundle exec rake gem:${{ matrix.platform }}"

      - uses: actions/upload-artifact@v7
        with:
          name: "gem-${{matrix.platform}}"
          path: pkg
          retention-days: 1

  install:
    name: "Install on ${{ matrix.platform }}"
    needs: [package]
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { platform: ruby,           os: ubuntu-latest,  ruby-version: "4",   verify: "(rodiff 2>&1 || true) | fgrep 'ERROR: Cannot find the odiff executable'" }
          - { platform: x86_64-linux,   os: ubuntu-latest,  ruby-version: "4",   verify: "rodiff --help" }
          - { platform: x86_64-darwin,  os: macos-15-intel, ruby-version: "4",   verify: "rodiff --help" }
          - { platform: arm64-darwin,   os: macos-26,       ruby-version: "4",   verify: "rodiff --help" }
          - { platform: x64-mingw32,    os: windows-latest, ruby-version: "3.0", verify: "rodiff --help" }
          - { platform: x64-mingw-ucrt, os: windows-latest, ruby-version: "4",   verify: "rodiff --help" }
    steps:
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: ${{ matrix.ruby-version }}
      - uses: actions/download-artifact@v8
        with:
          name: "gem-${{ matrix.platform }}"
          path: pkg
      - run: "gem install pkg/rodiff-*.gem"
      - run: ${{ matrix.verify }}
        shell: bash